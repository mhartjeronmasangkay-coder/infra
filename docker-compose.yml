
services:

  # Laravel Backend
  backend:
    build:
      context: ../mhart1.1
      dockerfile: Dockerfile
    container_name: quizapp-backend
    restart: unless-stopped
    volumes:
      - ../mhart1.1:/var/www/html
      - /var/www/html/vendor
    networks:
      - quizapp-network
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

  # Nginx for Laravel
  nginx:
    image: nginx:alpine
    container_name: quizapp-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ../mhart1.1:/var/www/html
      - ../mhart1.1/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - quizapp-network

  # Angular Frontend
  frontend:
    build:
      context: ../quizapp
      dockerfile: Dockerfile
    container_name: quizapp-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - quizapp-network

  # MySQL Database
  database:
    image: mysql:8.0
    container_name: quizapp-database
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - quizapp-network

networks:
  quizapp-network:
    driver: bridge

volumes:
  dbdata:
    driver: local